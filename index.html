<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Coder Tutor</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=VT323&family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  
  <!-- Pyodide for Real Python Execution -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

  <style>
    /* ---------- Base Styles ---------- */
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    h2 { font-family: 'Press Start 2P', cursive; }

    /* ---------- Pixel / Retro Styles ---------- */
    .font-pixel { font-family: 'VT323', monospace !important; }
    .font-pixel-bold { font-family: 'Press Start 2P', cursive !important; }
    .font-code { font-family: 'JetBrains Mono', monospace !important; }
    .font-body { font-family: 'Outfit', sans-serif !important; }
    
    .pixel-card {
      background-color: #1e293b;
      border: 4px solid #0f172a;
      box-shadow: 6px 6px 0px 0px rgba(0,0,0,0.5);
      border-radius: 8px;
    }
    
    .pixel-btn {
      font-family: 'Inter', sans-serif;
      border: 2px solid #000;
      box-shadow: 4px 4px 0px 0px #000;
      cursor: pointer;
      transition: all 0.1s;
      border-radius: 6px;
      position: relative;
    }
    .pixel-btn:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px 0px #000;
    }
    .pixel-btn:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px 0px #000;
    }

    /* ---------- Animations ---------- */
    @keyframes grid-move {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }
    .animate-grid {
      animation: grid-move 4s linear infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.3; text-shadow: 0 0 20px rgba(236, 72, 153, 0); }
      50% { opacity: 1; text-shadow: 0 0 30px rgba(236, 72, 153, 0.6); }
    }
    .animate-text-glow {
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }

    /* ---------- Scrollbars ---------- */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    @media (min-width: 640px) {
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
    }
    .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }

    .hero-gradient {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    }

    /* Custom no-scrollbar utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "path": "https://esm.sh/path@^0.12.7",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "url": "https://esm.sh/url@^0.11.4",
    "mermaid": "https://esm.sh/mermaid@^11.12.2"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
